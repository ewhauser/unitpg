name: PR validation

on:
  pull_request:
    branches:
      - main
      - master
      - rusty

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  clippy:
    name: Rust lint
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      PGCORE_BUILD_DIR: benches/.build/ci-clippy-pgcore
      RELEASE_JOBS: 4

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install Rust toolchain
        run: |
          cargo --version
          cargo clippy --version
          rustfmt --version

      - name: Build fastpg PostgreSQL core
        run: |
          set -euo pipefail
          rm -rf "$PGCORE_BUILD_DIR"
          meson setup "$PGCORE_BUILD_DIR" . \
            --buildtype=release \
            --auto-features=disabled \
            -Dtap_tests=disabled \
            -Dfastpg=true \
            -Dfastpg_catalog_mode=rust
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"

      - name: Run lint
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: make -C benches lint CLIPPY_ARGS="--workspace --all-targets --all-features"

  regression:
    name: Upstream SQL regression inventory
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install Rust toolchain
        run: |
          cargo --version
          rustfmt --version

      - name: Run upstream SQL regression inventory
        run: make -C benches regression REGRESSION_FAIL_ON_DIFFERENCES=1 REGRESSION_GLOBAL_TIMEOUT=900

      - name: Upload regression inventory results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-regression-inventory
          path: benches/results/upstream-regression/**
          if-no-files-found: ignore
          retention-days: 7

  validate:
    name: Validate ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-aarch64
            runner: macos-15

    env:
      PGCORE_BUILD_DIR: benches/.build/ci-pgcore-${{ matrix.target }}
      RELEASE_JOBS: 4

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install bison flex meson ninja
          {
            echo "$(brew --prefix bison)/bin"
            echo "$(brew --prefix flex)/bin"
          } >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          cargo --version
          cargo clippy --version
          rustfmt --version

      - name: Build fastpg PostgreSQL core
        run: |
          set -euo pipefail
          rm -rf "$PGCORE_BUILD_DIR"
          meson setup "$PGCORE_BUILD_DIR" . \
            --buildtype=release \
            --auto-features=disabled \
            -Dtap_tests=disabled \
            -Dfastpg=true
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"
          meson test -C "$PGCORE_BUILD_DIR" --print-errorlogs --num-processes 1 postgresql:tmp_install

      - name: Build Rust server
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: cargo build --release -p fastpg-server --features postgres-execution

      - name: Run Rust unit tests
        run: cargo test --workspace

      - name: Switch pgcore to Rust catalog for linked Rust tests
        run: |
          set -euo pipefail
          meson configure "$PGCORE_BUILD_DIR" -Dfastpg_catalog_mode=rust
          meson setup --reconfigure "$PGCORE_BUILD_DIR" -Dfastpg=true
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"

      - name: Run linked pgcore tests
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
          RUST_TEST_THREADS: 1
        run: cargo test -p fastpg-pgcore --features postgres-execution,rust-catalog

      - name: Run Rust server integration tests
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: cargo test -p fastpg-testkit --features postgres-execution,rust-catalog

      - name: Package Rust server distribution
        run: |
          set -euo pipefail
          ci/package-rust-server-dist.sh \
            target/release/fastpg-server \
            "$PGCORE_BUILD_DIR/tmp_install/usr/local/pgsql" \
            "${{ matrix.target }}" \
            "$RUNNER_TEMP/server-dist"

      - name: Check package layout
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-${{ matrix.target }}"
          test -x "$dist/bin/fastpg-server"
          test -x "$dist/bin/psql"
          test -x "$dist/bin/pgbench"
          test -f "$dist/README.server.txt"

      - name: Smoke-test packaged Rust server
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-${{ matrix.target }}"
          workdir="$RUNNER_TEMP/server-smoke"
          rm -rf "$workdir"
          mkdir -p "$workdir"
          unset FASTPG_PGDATA
          if "$dist/bin/fastpg-server" "127.0.0.1:0" >"$workdir/fastpg-server.log" 2>&1; then
            cat "$workdir/fastpg-server.log" >&2
            exit 1
          fi
          grep -F "Postgres catalog mode requires FASTPG_PGDATA" "$workdir/fastpg-server.log"

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: pr-server-dist-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/server-dist/*.tar.gz
            ${{ runner.temp }}/server-dist/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7
