name: PR validation

on:
  pull_request:
    branches:
      - main
      - master
      - rusty

permissions: {}

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  clippy:
    name: Rust lint
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      PGCORE_BUILD_DIR: benches/.build/ci-clippy-pgcore
      RELEASE_JOBS: 4

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install Rust toolchain
        run: |
          cargo --version
          cargo clippy --version
          rustfmt --version

      - name: Build fastpg PostgreSQL core
        run: |
          set -euo pipefail
          rm -rf "$PGCORE_BUILD_DIR"
          meson setup "$PGCORE_BUILD_DIR" . \
            --buildtype=release \
            --auto-features=disabled \
            -Dtap_tests=disabled \
            -Dfastpg=true \
            -Dfastpg_catalog_mode=rust
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"

      - name: Run lint
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: make -C benches lint CLIPPY_ARGS="--workspace --all-targets --all-features"

  regression:
    name: Upstream SQL regression inventory
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install Rust toolchain
        run: |
          cargo --version
          rustfmt --version

      - name: Run upstream SQL regression inventory
        run: make -C benches regression REGRESSION_FAIL_ON_DIFFERENCES=1 REGRESSION_GLOBAL_TIMEOUT=900 FASTPG_CASE_TIMEOUT=180

      - name: Upload regression inventory results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upstream-regression-inventory
          path: benches/results/upstream-regression/**
          if-no-files-found: ignore
          retention-days: 7

  performance:
    name: FastPG performance gate
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write # Update the FastPG performance report comment on the PR.

    env:
      PERF_OUTPUT_DIR: ${{ github.workspace }}/fastpg-performance

    steps:
      - name: Check out base source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Check out PR source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          persist-credentials: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Run FastPG performance comparison
        env:
          BASE_LABEL: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_LABEL: PR head
        run: |
          set -uo pipefail
          mkdir -p "$PERF_OUTPUT_DIR"
          script="head/ci/fastpg_perf_gate.py"
          if [ -f "base/ci/fastpg_perf_gate.py" ]; then
            script="base/ci/fastpg_perf_gate.py"
          fi
          set +e
          python3 "$script" \
            --base-repo base \
            --head-repo head \
            --output-dir "$PERF_OUTPUT_DIR" \
            --base-label "$BASE_LABEL" \
            --head-label "$HEAD_LABEL" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --threshold-percent 5.0 \
            --scale 1 \
            --transactions 20 \
            --runs 3
          status=$?
          echo "$status" > "$PERF_OUTPUT_DIR/exit-code"
          exit 0

      - name: Add performance report to job summary
        if: always()
        run: |
          if [ -f "$PERF_OUTPUT_DIR/report.md" ]; then
            cat "$PERF_OUTPUT_DIR/report.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fastpg-performance-report
          path: ${{ env.PERF_OUTPUT_DIR }}/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment on PR
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPORT_PATH: ${{ env.PERF_OUTPUT_DIR }}/report.md
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          marker = "<!-- fastpg-performance-report -->"
          report_path = Path(os.environ["REPORT_PATH"])
          if report_path.exists():
              body = report_path.read_text()
          else:
              body = f"{marker}\n## FastPG Performance Gate: FAIL\n\nNo performance report was produced."
          if marker not in body:
              body = f"{marker}\n{body}"

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request(method, path, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode()
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(f"{api_url}{path}", data=data, headers=headers, method=method)
              with urllib.request.urlopen(req) as response:
                  text = response.read().decode()
              return json.loads(text) if text else None

          comments = request("GET", f"/repos/{repo}/issues/{pr_number}/comments?per_page=100")
          existing = next((comment for comment in comments if marker in comment.get("body", "")), None)
          if existing:
              request("PATCH", f"/repos/{repo}/issues/comments/{existing['id']}", {"body": body})
          else:
              request("POST", f"/repos/{repo}/issues/{pr_number}/comments", {"body": body})
          PY

      - name: Enforce performance gate
        if: always()
        run: |
          if [ ! -f "$PERF_OUTPUT_DIR/exit-code" ]; then
            exit 1
          fi
          exit "$(cat "$PERF_OUTPUT_DIR/exit-code")"

  validate:
    name: Validate ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-aarch64
            runner: macos-15

    env:
      PGCORE_BUILD_DIR: benches/.build/ci-pgcore-${{ matrix.target }}
      RELEASE_JOBS: 4

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install bison flex meson ninja
          {
            echo "$(brew --prefix bison)/bin"
            echo "$(brew --prefix flex)/bin"
          } >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          cargo --version
          cargo clippy --version
          rustfmt --version

      - name: Build fastpg PostgreSQL core
        run: |
          set -euo pipefail
          rm -rf "$PGCORE_BUILD_DIR"
          meson setup "$PGCORE_BUILD_DIR" . \
            --buildtype=release \
            --auto-features=disabled \
            -Dtap_tests=disabled \
            -Dfastpg=true
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"
          meson test -C "$PGCORE_BUILD_DIR" --print-errorlogs --num-processes 1 postgresql:tmp_install

      - name: Build Rust server
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: cargo build --release -p fastpg-server --features postgres-execution

      - name: Run Rust unit tests
        run: cargo test --workspace

      - name: Switch pgcore to Rust catalog for linked Rust tests
        run: |
          set -euo pipefail
          meson configure "$PGCORE_BUILD_DIR" -Dfastpg_catalog_mode=rust
          meson setup --reconfigure "$PGCORE_BUILD_DIR" -Dfastpg=true
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"

      - name: Run linked pgcore tests
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
          RUST_TEST_THREADS: 1
        run: cargo test -p fastpg-pgcore --features postgres-execution,rust-catalog

      - name: Run Rust server integration tests
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: cargo test -p fastpg-testkit --features postgres-execution,rust-catalog

      - name: Package Rust server distribution
        env:
          DIST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ci/package-rust-server-dist.sh \
            target/release/fastpg-server \
            "$PGCORE_BUILD_DIR/tmp_install/usr/local/pgsql" \
            "$DIST_TARGET" \
            "$RUNNER_TEMP/server-dist"

      - name: Check package layout
        env:
          DIST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-$DIST_TARGET"
          test -x "$dist/bin/fastpg-server"
          test -x "$dist/bin/psql"
          test -x "$dist/bin/pgbench"
          test -f "$dist/README.server.txt"

      - name: Smoke-test packaged Rust server
        env:
          DIST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-$DIST_TARGET"
          workdir="$RUNNER_TEMP/server-smoke"
          rm -rf "$workdir"
          mkdir -p "$workdir"
          unset FASTPG_PGDATA
          if "$dist/bin/fastpg-server" "127.0.0.1:0" >"$workdir/fastpg-server.log" 2>&1; then
            cat "$workdir/fastpg-server.log" >&2
            exit 1
          fi
          grep -F "Postgres catalog mode requires FASTPG_PGDATA" "$workdir/fastpg-server.log"

      - name: Upload binary archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-server-dist-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/server-dist/*.tar.gz
            ${{ runner.temp }}/server-dist/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7
