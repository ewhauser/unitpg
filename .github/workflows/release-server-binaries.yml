name: Release server binaries

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-server-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-aarch64
            runner: macos-15

    env:
      RELEASE_BUILD_DIR: bench/.build/release-${{ matrix.target }}
      RELEASE_JOBS: 4
      PGVECTOR_VERSION: v0.8.2

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install bison flex meson ninja
          {
            echo "$(brew --prefix bison)/bin"
            echo "$(brew --prefix flex)/bin"
          } >> "$GITHUB_PATH"

      - name: Build release server
        run: |
          set -euo pipefail
          rm -rf "$RELEASE_BUILD_DIR"
          meson setup "$RELEASE_BUILD_DIR" \
            -Dauto_features=disabled \
            -Dtap_tests=auto \
            -Dicu=disabled \
            -Dreadline=disabled \
            -Dssl=none \
            -Dzlib=disabled \
            -Dlz4=disabled \
            -Dzstd=disabled \
            -Dtest_fake_wal=false \
            -Dtest_no_bg_jobs=false \
            -Dtest_mem_smgr=false \
            -Dtest_ephemeral_buffers=false \
            -Dtest_mem_slru=false \
            -Dtest_epoch_rollback=false \
            -Dtest_no_wal_assembly=false \
            -Dtest_no_observability=false \
            -Dtest_fast_memory_contexts=false \
            -Dtest_ephemeral_catalog=false \
            -Dtest_no_durable_maintenance=false \
            -Dtest_fast_analyze=false \
            -Dtest_no_recovery_startup=false \
            -Dtest_seed_only_startup=false \
            -Dtest_no_data_directory_startup=false \
            -Dtest_macos_named_posix_semaphores=false \
            -Dtest_no_sysv_shared_memory=false
          meson compile -C "$RELEASE_BUILD_DIR" -j "$RELEASE_JOBS"

      - name: Create temporary server install
        run: meson test -C "$RELEASE_BUILD_DIR" --print-errorlogs --num-processes 1 postgresql:tmp_install

      - name: Build pgvector extension
        run: |
          ci/build-pgvector.sh \
            "$RELEASE_BUILD_DIR/tmp_install/usr/local/pgsql" \
            "$RUNNER_TEMP/pgvector" \
            "$PGVECTOR_VERSION"

      - name: Package server distribution
        run: |
          ci/package-server-dist.sh \
            "$RELEASE_BUILD_DIR/tmp_install/usr/local/pgsql" \
            "${{ matrix.target }}" \
            "$RUNNER_TEMP/server-dist"

      - name: Check package module layout
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-${{ matrix.target }}"
          find "$dist/lib" -maxdepth 3 \
            \( -name 'dict_snowball*' -o -name 'plpgsql*' -o -name 'vector*' \) \
            -print
          test -x "$dist/bin/pg_dump"
          test -n "$(find "$dist/lib" -maxdepth 3 -name 'dict_snowball*' -print -quit)"
          test -n "$(find "$dist/lib" -maxdepth 3 -name 'vector*' -print -quit)"
          test -f "$dist/share/extension/vector.control"
          test -n "$(find "$dist/share/extension" -maxdepth 1 -name 'vector--*.sql' -print -quit)"

      - name: Smoke-test packaged server
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-${{ matrix.target }}"
          workdir="$RUNNER_TEMP/server-smoke"
          rm -rf "$workdir"
          mkdir -p "$workdir"
          export LC_ALL=C
          "$dist/bin/initdb" \
            -D "$workdir/data" \
            --no-sync \
            -A trust \
            -U postgres \
            -c shared_memory_type=mmap
          "$dist/bin/pg_ctl" -D "$workdir/data" -l "$workdir/postgres.log" -o "-k $workdir" -w start
          "$dist/bin/psql" -h "$workdir" -d postgres -U postgres -Atqc "select 1" | grep -Fx 1
          "$dist/bin/psql" -h "$workdir" -d postgres -U postgres -Atqc \
            "create extension vector; select vector_dims('[1,2,3]'::vector);" | grep -Fx 3
          "$dist/bin/pg_dump" -h "$workdir" -d postgres -U postgres --schema-only >/dev/null
          "$dist/bin/pg_ctl" -D "$workdir/data" -m fast -w stop

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: server-dist-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/server-dist/*.tar.gz
            ${{ runner.temp }}/server-dist/*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 15

    steps:
      - name: Download binary archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          tag="postgres-server-${short_sha}"
          title="PostgreSQL server binaries ${short_sha}"
          notes="$RUNNER_TEMP/release-notes.md"

          {
            echo "PostgreSQL server binary distributions for ${GITHUB_SHA}."
            echo
            echo "Fast-fork experimental build flags are disabled in these release artifacts."
            echo
            echo "Assets:"
            for archive in dist/*.tar.gz; do
              echo "- $(basename "$archive")"
            done
          } > "$notes"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes-file "$notes"
          fi
