name: Release server binaries

on:
  push:
    branches:
      - main
      - master
      - rusty
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-server-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-aarch64
            runner: macos-15

    env:
      PGCORE_BUILD_DIR: benches/.build/ci-pgcore-${{ matrix.target }}
      RELEASE_JOBS: 4
      PGVECTOR_VERSION: v0.8.2

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            flex \
            libipc-run-perl \
            meson \
            ninja-build \
            patchelf \
            perl \
            pkg-config \
            python3

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install bison flex meson ninja
          {
            echo "$(brew --prefix bison)/bin"
            echo "$(brew --prefix flex)/bin"
          } >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          cargo --version
          cargo clippy --version
          rustfmt --version

      - name: Build fastpg PostgreSQL core
        run: |
          set -euo pipefail
          rm -rf "$PGCORE_BUILD_DIR"
          meson setup "$PGCORE_BUILD_DIR" . \
            --buildtype=release \
            --auto-features=disabled \
            -Dtap_tests=disabled \
            -Dfastpg=true
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"
          meson test -C "$PGCORE_BUILD_DIR" --print-errorlogs --num-processes 1 postgresql:tmp_install

      - name: Build pgvector extension
        run: |
          ci/build-pgvector.sh \
            "$PGCORE_BUILD_DIR/tmp_install/usr/local/pgsql" \
            "$RUNNER_TEMP/pgvector" \
            "$PGVECTOR_VERSION"

      - name: Build Rust server
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: cargo build --release -p fastpg-server --features postgres-execution

      - name: Run Rust unit tests
        run: cargo test --workspace

      - name: Run pgvector integration test
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: cargo test -p fastpg-testkit --features postgres-execution --test pgvector_smoke

      - name: Switch pgcore to Rust catalog for linked Rust tests
        run: |
          set -euo pipefail
          meson configure "$PGCORE_BUILD_DIR" -Dfastpg_catalog_mode=rust
          meson setup --reconfigure "$PGCORE_BUILD_DIR" -Dfastpg=true
          meson compile -C "$PGCORE_BUILD_DIR" -j "$RELEASE_JOBS"

      - name: Run linked pgcore tests
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
          RUST_TEST_THREADS: 1
        run: cargo test -p fastpg-pgcore --features postgres-execution,rust-catalog

      - name: Run Rust server integration tests
        env:
          FASTPG_POSTGRES_BUILD_DIR: ${{ env.PGCORE_BUILD_DIR }}
        run: cargo test -p fastpg-testkit --features postgres-execution,rust-catalog

      - name: Package Rust server distribution
        env:
          DIST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ci/package-rust-server-dist.sh \
            target/release/fastpg-server \
            "$PGCORE_BUILD_DIR/tmp_install/usr/local/pgsql" \
            "$DIST_TARGET" \
            "$RUNNER_TEMP/server-dist"

      - name: Check package layout
        env:
          DIST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-$DIST_TARGET"
          test -x "$dist/bin/fastpg-server"
          test -x "$dist/bin/psql"
          test -x "$dist/bin/pgbench"
          test -f "$dist/README.server.txt"
          test -n "$(find "$dist/lib" -maxdepth 3 -name 'vector*' -print -quit)"
          test -f "$dist/share/extension/vector.control"
          test -n "$(find "$dist/share/extension" -maxdepth 1 -name 'vector--*.sql' -print -quit)"

      - name: Smoke-test packaged Rust server
        env:
          DIST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/server-dist/postgres-server-$DIST_TARGET"
          workdir="$RUNNER_TEMP/server-smoke"
          rm -rf "$workdir"
          mkdir -p "$workdir"
          unset FASTPG_PGDATA
          if "$dist/bin/fastpg-server" "127.0.0.1:0" >"$workdir/fastpg-server.log" 2>&1; then
            cat "$workdir/fastpg-server.log" >&2
            exit 1
          fi
          grep -F "Postgres catalog mode requires FASTPG_PGDATA" "$workdir/fastpg-server.log"

      - name: Upload binary archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-dist-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/server-dist/*.tar.gz
            ${{ runner.temp }}/server-dist/*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 15
    environment: release
    permissions:
      attestations: write # Publish build provenance for release archives.
      contents: write # Create the GitHub release and upload assets.
      id-token: write # Request an OIDC signing token for attestations.

    steps:
      - name: Download binary archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/*

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          tag="postgres-server-${short_sha}"
          title="PostgreSQL Rust server binaries ${short_sha}"
          notes="$RUNNER_TEMP/release-notes.md"

          {
            echo "fastpg Rust single-process server binary distributions for ${GITHUB_SHA}."
            echo
            echo "Archives include pgvector extension files built against the packaged PostgreSQL install."
            echo
            echo "Assets:"
            for archive in dist/*.tar.gz; do
              echo "- $(basename "$archive")"
            done
          } > "$notes"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release already exists: $tag" >&2
            exit 1
          fi

          gh release create "$tag" dist/* \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --notes-file "$notes"
