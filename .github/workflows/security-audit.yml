name: Security audit

on:
  pull_request:
    branches:
      - main
      - master
      - rusty
  push:
    branches:
      - main
      - master
      - rusty

permissions: {}

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Run zizmor
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "$PWD:/workspace:ro" \
            --workdir /workspace \
            ghcr.io/zizmorcore/zizmor@sha256:14ea7f5cc7c67933394a35b5a38a277397818d232602635edb2010b313afb110 \
            --persona=pedantic \
            --offline \
            .github/workflows
