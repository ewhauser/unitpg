version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      rust-patch-and-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      github-actions-patch-and-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
